    <title>
      Live Voting Leaderboard - MOUAEC Week 2025 | Real-Time Rankings | Vote Now
    </title>
    <link rel="canonical" href="https://mouau.edu.ng/voting/dashboard" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #07080d;
        --surface: #0e1018;
        --border: rgba(255, 255, 255, 0.07);
        --text: #eeeef5;
        --muted: #4a4a5a;
        --gold: #f5c842;
        --gold-dim: rgba(245, 200, 66, 0.12);
      }

      html,
      body {
        height: 100%;
        overflow-x: hidden;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Mono", monospace;
        min-height: 100vh;
      }

      /* ── noise overlay ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
      }

      /* ── grid lines ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 48px 48px;
      }

      .wrap {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 2.5rem;
        flex-wrap: wrap;
      }

      .header-left h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.8rem, 4vw, 3rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .header-left h1 span {
        color: var(--gold);
      }

      .header-left p {
        margin-top: 0.5rem;
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .header-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.7rem;
      }

      /* LIVE badge */
      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(255, 60, 60, 0.1);
        border: 1px solid rgba(255, 60, 60, 0.3);
        color: #ff4444;
        padding: 0.35rem 0.75rem;
        border-radius: 2px;
        font-size: 0.68rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ff4444;
        animation: pulse-red 1.2s ease-in-out infinite;
      }
      @keyframes pulse-red {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.5);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(255, 68, 68, 0);
        }
      }

      /* countdown */
      .countdown {
        font-family: "Syne", sans-serif;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.05em;
      }
      .countdown span {
        color: var(--text);
      }

      /* total votes */
      .total-votes {
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        text-align: right;
      }
      .total-votes strong {
        display: block;
        font-family: "Syne", sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      /* ── Leaderboard ── */
      .board {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* ── Contestant card ── */
      .card {
        position: relative;
        overflow: hidden;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1.25rem 1.5rem;
        transition: border-color 0.4s ease;
        cursor: default;
      }

      .card:hover {
        border-color: rgba(255, 255, 255, 0.14);
      }

      /* rank 1 gets gold border accent */
      .card.rank-1 {
        border-color: rgba(245, 200, 66, 0.25);
      }
      .card.rank-1::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--gold);
        border-radius: 4px 0 0 4px;
      }

      /* animated background fill (vote bar) */
      .card-fill {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.03) 0%,
          transparent 100%
        );
        transform-origin: left;
        transform: scaleX(0);
        transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        pointer-events: none;
      }

      .card-inner {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 1.2rem;
        position: relative;
        z-index: 1;
      }

      /* rank number */
      .rank {
        font-family: "Syne", sans-serif;
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--muted);
        width: 2.2rem;
        text-align: center;
        line-height: 1;
        transition: color 0.4s;
      }
      .card.rank-1 .rank {
        color: var(--gold);
      }

      /* avatar */
      .avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-size: 1.1rem;
        font-weight: 800;
        flex-shrink: 0;
        border: 2px solid var(--border);
        transition: border-color 0.4s;
        position: relative;
        overflow: hidden;
      }

      /* contestant info */
      .info {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .info-top {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .name {
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .badge {
        font-size: 0.6rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 0.2rem 0.55rem;
        border-radius: 2px;
        font-family: "DM Mono", monospace;
      }

      .dept {
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 0.05em;
      }

      /* progress bar */
      .prog-wrap {
        margin-top: 0.75rem;
        height: 3px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 2px;
        overflow: hidden;
      }
      .prog-bar {
        height: 100%;
        border-radius: 2px;
        width: 0%;
        transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* vote count */
      .vote-block {
        text-align: right;
        flex-shrink: 0;
      }
      .vote-count {
        font-family: "Syne", sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.03em;
      }
      .vote-label {
        font-size: 0.6rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 0.25rem;
      }
      .vote-pct {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.1rem;
      }

      /* flash on update */
      @keyframes flash {
        0% {
          background: rgba(255, 255, 255, 0.06);
        }
        100% {
          background: transparent;
        }
      }
      .card.updated {
        animation: flash 0.5s ease-out forwards;
      }

      /* ── Crown for #1 ── */
      .crown {
        position: absolute;
        top: -0.1rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.85rem;
        line-height: 1;
      }

      /* ── Vote button ── */
      .vote-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        padding: 0.5rem 1.1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 2px;
        background: transparent;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.25s ease;
      }
      .vote-btn:hover {
        border-color: rgba(255, 255, 255, 0.3);
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }
      .vote-btn svg {
        width: 12px;
        height: 12px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      /* ── Footer stats ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        margin-top: 2rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
      }
      .stat {
        background: var(--surface);
        padding: 1.2rem 1.5rem;
        text-align: center;
      }
      .stat-val {
        font-family: "Syne", sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--text);
      }
      .stat-lbl {
        font-size: 0.62rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 0.3rem;
      }

      /* ── Prizes bar ── */
      .prizes {
        margin-top: 2rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        padding: 1.25rem 1.5rem;
      }
      .prizes-title {
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1rem;
      }
      .prizes-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      .prize {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.4rem 0.85rem;
        background: var(--gold-dim);
        border: 1px solid rgba(245, 200, 66, 0.2);
        border-radius: 2px;
        font-size: 0.68rem;
        letter-spacing: 0.1em;
        color: var(--gold);
      }
      .prize svg {
        width: 12px;
        height: 12px;
        stroke: var(--gold);
        fill: none;
        stroke-width: 2;
      }

      /* ── New vote toast ── */
      .toast-wrap {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        pointer-events: none;
      }
      .toast {
        background: #0e1018;
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 0.6rem 1rem;
        font-size: 0.68rem;
        letter-spacing: 0.1em;
        color: var(--muted);
        opacity: 0;
        transform: translateX(20px);
        transition:
          opacity 0.25s,
          transform 0.25s;
        max-width: 220px;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(0);
      }

      @media (max-width: 560px) {
        .card-inner {
          grid-template-columns: auto 1fr auto;
          gap: 0.8rem;
        }
        .avatar {
          width: 40px;
          height: 40px;
          font-size: 0.9rem;
        }
        .vote-count {
          font-size: 1.2rem;
        }
        .stats-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Header -->
      <header>
        <div class="header-left">
          <h1>Students'<br /><span>Week Vote</span></h1>
          <p>Live poll · Cast your vote · Win big</p>
        </div>
        <div class="header-right">
          <div class="live-badge">
            <div class="live-dot"></div>
            Live Now
          </div>
          <div class="countdown">
            Ends in <span id="cdTimer">5d 14h 22m 08s</span>
          </div>
          <div class="total-votes">
            <strong id="totalVotes">0</strong>
            total votes cast
          </div>
        </div>
      </header>

      <!-- Leaderboard -->
      <div class="board" id="board"></div>

      <!-- Footer stats -->
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val" id="votersCount">0</div>
          <div class="stat-lbl">Unique Voters</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="revenueVal">₦0</div>
          <div class="stat-lbl">Revenue Generated</div>
        </div>
        <div class="stat">
          <div class="stat-val">6</div>
          <div class="stat-lbl">Contestants</div>
        </div>
      </div>

      <!-- Prizes -->
      <div class="prizes">
        <div class="prizes-title">🏆 Winner takes all</div>
        <div class="prizes-list">
          <div class="prize">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              />
            </svg>
            Monetisation Privileges
          </div>
          <div class="prize">
            <svg viewBox="0 0 24 24">
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
              />
            </svg>
            Free Business Boost — 1 Year
          </div>
          <div class="prize">
            <svg viewBox="0 0 24 24">
              <path
                d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"
              />
            </svg>
            Free Internet Connection
          </div>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      /* ── Data ── */
      const contestants = [
        {
          id: 1,
          name: "Ada Okonkwo",
          dept: "Computer Science",
          initials: "AO",
          color: "#a78bfa",
          bg: "rgba(167,139,250,0.12)",
          badge: "Fan Fav",
          badgeColor: "rgba(167,139,250,0.15)",
          badgeText: "#a78bfa",
          votes: 4812,
        },
        {
          id: 2,
          name: "Emeka Dike",
          dept: "Engineering",
          initials: "ED",
          color: "#f97316",
          bg: "rgba(249,115,22,0.12)",
          badge: "Rising",
          badgeColor: "rgba(249,115,22,0.15)",
          badgeText: "#f97316",
          votes: 3944,
        },
        {
          id: 3,
          name: "Chisom Eze",
          dept: "Business Admin",
          initials: "CE",
          color: "#22d3ee",
          bg: "rgba(34,211,238,0.12)",
          badge: "Wildcard",
          badgeColor: "rgba(34,211,238,0.15)",
          badgeText: "#22d3ee",
          votes: 3120,
        },
        {
          id: 4,
          name: "Tunde Balogun",
          dept: "Law",
          initials: "TB",
          color: "#f5c842",
          bg: "rgba(245,200,66,0.12)",
          badge: "Top 4",
          badgeColor: "rgba(245,200,66,0.15)",
          badgeText: "#f5c842",
          votes: 2675,
        },
        {
          id: 5,
          name: "Fatima Usman",
          dept: "Medicine",
          initials: "FU",
          color: "#4ade80",
          bg: "rgba(74,222,128,0.12)",
          badge: "Top 5",
          badgeColor: "rgba(74,222,128,0.15)",
          badgeText: "#4ade80",
          votes: 1830,
        },
        {
          id: 6,
          name: "Kola Adeyemi",
          dept: "Architecture",
          initials: "KA",
          color: "#fb7185",
          bg: "rgba(251,113,133,0.12)",
          badge: "Underdog",
          badgeColor: "rgba(251,113,133,0.15)",
          badgeText: "#fb7185",
          votes: 940,
        },
      ];

      const VOTE_PRICE = 100; // ₦100 per vote
      let totalVoters = Math.floor(
        contestants.reduce((s, c) => s + c.votes, 0) * 0.62,
      );

      /* ── Build cards ── */
      function totalVotes() {
        return contestants.reduce((s, c) => s + c.votes, 0);
      }

      function buildBoard() {
        const board = document.getElementById("board");
        board.innerHTML = "";
        const sorted = [...contestants].sort((a, b) => b.votes - a.votes);
        const total = totalVotes();

        sorted.forEach((c, i) => {
          const rank = i + 1;
          const pct = ((c.votes / total) * 100).toFixed(1);

          const card = document.createElement("div");
          card.className = "card" + (rank === 1 ? " rank-1" : "");
          card.id = "card-" + c.id;
          card.innerHTML = `
      <div class="card-fill" id="fill-${c.id}"></div>
      <div class="card-inner">
        <div class="rank">${rank === 1 ? "" : "#" + rank}</div>
        <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:0;">
          <div class="avatar" style="background:${c.bg};border-color:${c.color}22;">
            ${rank === 1 ? '<span class="crown">👑</span>' : ""}
            <span style="position:relative;z-index:1;color:${c.color}">${c.initials}</span>
          </div>
          <div class="info" style="flex:1;min-width:0;">
            <div class="info-top">
              <span class="name">${c.name}</span>
              <span class="badge" style="background:${c.badgeColor};color:${c.badgeText};">${c.badge}</span>
            </div>
            <div class="dept">${c.dept}</div>
            <div class="prog-wrap">
              <div class="prog-bar" id="bar-${c.id}" style="background:${c.color};width:${pct}%"></div>
            </div>
          </div>
        </div>
        <div class="vote-block">
          <div class="vote-count" id="vc-${c.id}" style="color:${c.color}">${c.votes.toLocaleString()}</div>
          <div class="vote-label">votes</div>
          <div class="vote-pct" id="pct-${c.id}">${pct}%</div>
          <button class="vote-btn" onclick="castVote(${c.id})">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Vote
          </button>
        </div>
      </div>`;
          board.appendChild(card);

          /* animate fill bar width on load */
          requestAnimationFrame(() => {
            setTimeout(
              () => {
                const fill = document.getElementById("fill-" + c.id);
                if (fill) fill.style.transform = `scaleX(${pct / 100})`;
              },
              80 + i * 120,
            );
          });
        });

        /* update totals */
        document.getElementById("totalVotes").textContent =
          total.toLocaleString();
        document.getElementById("votersCount").textContent =
          totalVoters.toLocaleString();
        document.getElementById("revenueVal").textContent =
          "₦" + (total * VOTE_PRICE).toLocaleString();
      }

      /* ── Update a single card without full rebuild ── */
      function updateCard(id) {
        const c = contestants.find((x) => x.id === id);
        const total = totalVotes();
        const pct = ((c.votes / total) * 100).toFixed(1);

        const vcEl = document.getElementById("vc-" + id);
        const pEl = document.getElementById("pct-" + id);
        const barEl = document.getElementById("bar-" + id);
        const fill = document.getElementById("fill-" + id);
        const card = document.getElementById("card-" + id);

        if (vcEl) vcEl.textContent = c.votes.toLocaleString();
        if (pEl) pEl.textContent = pct + "%";
        if (barEl) barEl.style.width = pct + "%";
        if (fill) fill.style.transform = `scaleX(${pct / 100})`;

        /* flash */
        if (card) {
          card.classList.remove("updated");
          void card.offsetWidth;
          card.classList.add("updated");
        }

        /* reorder if needed */
        const sorted = [...contestants].sort((a, b) => b.votes - a.votes);
        const topId = sorted[0].id;
        document.querySelectorAll(".card").forEach((el) => {
          el.classList.remove("rank-1");
          const crown = el.querySelector(".crown");
          if (crown) crown.remove();
          const rank = el.querySelector(".rank");
          if (rank) {
            rank.textContent = "";
          }
        });
        const topCard = document.getElementById("card-" + topId);
        if (topCard) {
          topCard.classList.add("rank-1");
          const av = topCard.querySelector(".avatar");
          if (av && !av.querySelector(".crown")) {
            const cr = document.createElement("span");
            cr.className = "crown";
            cr.textContent = "👑";
            av.prepend(cr);
          }
          const rk = topCard.querySelector(".rank");
          if (rk) rk.textContent = "";
        }

        /* update totals */
        document.getElementById("totalVotes").textContent =
          total.toLocaleString();
        document.getElementById("votersCount").textContent =
          totalVoters.toLocaleString();
        document.getElementById("revenueVal").textContent =
          "₦" + (total * VOTE_PRICE).toLocaleString();
      }

      /* ── Toast notification ── */
      function showToast(msg) {
        const wrap = document.getElementById("toastWrap");
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = msg;
        wrap.appendChild(toast);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            toast.classList.add("show");
          });
        });
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 400);
        }, 2800);
      }

      /* ── Manual vote ── */
      function castVote(id) {
        const c = contestants.find((x) => x.id === id);
        c.votes++;
        totalVoters++;
        updateCard(id);
        showToast("✓ Vote cast for " + c.name.split(" ")[0]);
      }

      /* ── Simulate live votes ── */
      const names = [
        "Anonymous",
        "@kola__x",
        "A. Ibrahim",
        "Chidera",
        "Temi O.",
        "@fadz__",
        "Unknown",
      ];
      function simVote() {
        const weights = contestants.map((c) => c.votes);
        const sum = weights.reduce((a, b) => a + b, 0);
        let r = Math.random() * sum,
          pick = contestants[0];
        for (const c of contestants) {
          r -= c.votes;
          if (r <= 0) {
            pick = c;
            break;
          }
        }

        pick.votes += Math.floor(Math.random() * 3) + 1;
        totalVoters += Math.random() < 0.7 ? 1 : 0;
        updateCard(pick.id);

        const voter = names[Math.floor(Math.random() * names.length)];
        showToast(voter + " voted for " + pick.name.split(" ")[0]);
      }

      /* ── Countdown ── */
      function startCountdown() {
        const end =
          Date.now() + (5 * 24 * 60 * 60 + 14 * 60 * 60 + 22 * 60 + 8) * 1000;
        setInterval(() => {
          const diff = Math.max(0, end - Date.now());
          const d = Math.floor(diff / 86400000);
          const h = Math.floor((diff % 86400000) / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          document.getElementById("cdTimer").textContent =
            `${d}d ${String(h).padStart(2, "0")}h ${String(m).padStart(2, "0")}m ${String(s).padStart(2, "0")}s`;
        }, 1000);
      }

      /* ── Init ── */
      buildBoard();
      startCountdown();
      setInterval(simVote, 1800 + Math.random() * 1200);
    </script>
  </body>
</html>
